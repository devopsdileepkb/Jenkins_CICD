<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>
  <h2>Welcome!</h2>
  <form method="POST" action="/addnote">
    <textarea name="note"></textarea><br>
    <button type="submit">Add Note</button>
  </form>
  <h3>Your Notes:</h3>
  <ul>
    {% for n in notes %}
      <li>{{ n[0] }}</li>
    {% endfor %}
  </ul>
  <a href="/logout">Logout</a>
</body>
</html>
